<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telangana News Today | MaaOoru -- All 33 Districts Live</title>

<style>
body{font-family:Arial;background:#0D0D1A;color:white;margin:0;padding:20px;}
h1{color:#E94560;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.card{background:#1C1C2E;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<h1>MaaOoru Telangana News</h1>

<input type="text" id="search" placeholder="Search..." oninput="render()" style="padding:10px;width:100%;margin-bottom:20px;border-radius:8px;border:none;">

<div class="grid" id="news"></div>

<script>

{district:'Khammam',headline:'Sand mining racket busted',views:'11500'}

];

function render(){
  const container = document.getElementById('news');
  const search = document.getElementById('search').value.toLowerCase();
  container.innerHTML = '';

  districtNews
    .filter(item =>
      item.district.toLowerCase().includes(search) ||
      item.headline.toLowerCase().includes(search)
    )
    .forEach(item=>{
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${item.district}</h3>
        <p>${item.headline}</p>
        <small>${item.views} views</small>
      `;
      container.appendChild(div);
    });
}

render();

</script>

</body>
