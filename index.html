<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MaaOoru | Telangana 33 Districts Live</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090912; --card:#16162a; --red:#E94560; --green:#27AE60; --sub:#94A3B8; --text:#E2E8F0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* Responsive Navigation */
nav { 
  position: sticky; top: 0; z-index: 1000; background: rgba(13,13,26,0.9); 
  backdrop-filter: blur(10px); padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}
.nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; }
.nav-logo { background: var(--red); padding: 5px 10px; border-radius: 8px; font-weight: 800; }
.search-bar { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 15px; flex: 1; max-width: 400px; display: flex; }
.search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

/* Grid Layout - Responsive */
.container { max-width: 1300px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
@media (max-width: 992px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }

/* Filter Bar */
.filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { padding: 6px 15px; border-radius: 20px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--sub); cursor: pointer; white-space: nowrap; font-size: 13px; }
.chip.active { background: var(--red); color: white; border-color: var(--red); }

/* News Grid - Responsive Cards */
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
@media (max-width: 480px) { .news-grid { grid-template-columns: 1fr; } }

.card { background: var(--card); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-5px); border-color: var(--red); }
.card-img { height: 160px; background: linear-gradient(45deg, #1a1a3a, #0f3460); display: flex; align-items: center; justify-content: center; font-size: 50px; position: relative; }
.badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
.badge-ai { background: rgba(249,115,22,0.2); color: #f97316; }
.badge-live { background: var(--green); color: white; }

.card-body { padding: 15px; flex-grow: 1; }
.card-dist { font-size: 11px; color: var(--red); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
.card-title { font-size: 15px; font-weight: 700; color: white; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-telugu { font-family: 'Noto Sans Telugu', sans-serif; font-size: 13px; color: #F5C842; margin-bottom: 10px; }
.card-footer { font-size: 11px; color: var(--sub); display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

/* Sidebar */
.side-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
.side-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: var(--red); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
.dist-list { font-size: 12px; height: 400px; overflow-y: auto; padding-right: 5px; }
.dist-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
</style>
</head>
<body>
<nav>
  <a href="#" class="nav-brand"><div class="nav-logo">M</div> MaaOoru</a>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search any of 33 districts..." oninput="applyFilters()">
  </div>
  <button class="chip" onclick="toggleLang()" id="langBtn" style="color:white">Telugu</button>
</nav>

<div class="container">
  <main>
    <div class="filter-bar">
      <button class="chip active" onclick="filterCat('all', this)">All 33 Districts</button>
      <button class="chip" onclick="filterCat('live', this)">Live Only</button>
      <button class="chip" onclick="filterCat('agri', this)">Agriculture</button>
      <button class="chip" onclick="filterCat('local', this)">Local</button>
    </div>
    <div class="news-grid" id="newsGrid">
      </div>
  </main>

  <aside class="sidebar">
    <div class="side-card">
      <div class="side-title">District Index (A-Z)</div>
      <div class="dist-list" id="distIndex"></div>
    </div>
  </aside>
</div>
<script>
// The full list of 33 Telangana Districts
const districtNames = [
  "Adilabad", "Bhadradri Kothagudem", "Hanumakonda", "Hyderabad", "Jagtial", 
  "Jangaon", "Jayashankar Bhupalpally", "Jogulamba Gadwal", "Kamareddy", 
  "Karimnagar", "Khammam", "Kumuram Bheem Asifabad", "Mahabubabad", 
  "Mahabubnagar", "Mancherial", "Medak", "Medchal-Malkajgiri", "Mulugu", 
  "Nagarkurnool", "Nalgonda", "Narayanpet", "Nirmal", "Nizamabad", 
  "Peddapalli", "Rajanna Sircilla", "Ranga Reddy", "Sangareddy", 
  "Siddipet", "Suryapet", "Vikarabad", "Wanaparthy", "Warangal", "Yadadri Bhuvanagiri"
];

// Sample News Data (You can add more specific ones here)
const newsData = [
  { district: 'Nizamabad', cat: 'agri', live: true, emoji: '🌾', en_h: 'Turmeric prices hit record high at Nizamabad APMC', te_h: 'నిజామాబాద్ మార్కెట్లో పసుపు ధరల రికార్డు' },
  { district: 'Hyderabad', cat: 'local', live: false, emoji: '🕌', en_h: 'TSRTC adds 50 new electric buses to city fleet', te_h: 'హైదరాబాద్‌లో 50 కొత్త ఎలక్ట్రిక్ బస్సులు' },
  { district: 'Warangal', cat: 'local', live: true, emoji: '🏯', en_h: 'Textile Park phase 2 construction begins', te_h: 'వరంగల్ టెక్స్‌టైల్ పార్క్ పనులు ప్రారంభం' }
];

let isEnglish = true;
let currentCat = 'all';

// Function to generate the A-Z news feed
function generateFeed() {
  const grid = document.getElementById('newsGrid');
  const indexList = document.getElementById('distIndex');
  grid.innerHTML = '';
  indexList.innerHTML = '';

  const searchTerm = document.getElementById('searchInput').value.toLowerCase();

  districtNames.forEach(name => {
    // Check if we have specific news, else create a placeholder
    const news = newsData.find(n => n.district === name) || {
      district: name, cat: 'local', live: false, emoji: '📍',
      en_h: `${name} District: Daily Morning AI Update`,
      te_h: `${name} జిల్లా: ప్రతిరోజూ ఉదయం అప్డేట్`
    };

    // Skip if filter or search doesn't match
    if (currentCat === 'live' && !news.live) return;
    if (currentCat !== 'all' && currentCat !== 'live' && news.cat !== currentCat) return;
    if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;

    // Build sidebar index
    indexList.innerHTML += `<div class="dist-item"><span>${name}</span><span style="color:${news.live?'#27AE60':'#555'}">${news.live?'● Live':'Brief'}</span></div>`;

    // Build News Card
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img">
        ${news.emoji}
        <span class="badge ${news.live ? 'badge-live' : 'badge-ai'}">${news.live ? 'LIVE' : 'AI BRIEF'}</span>
      </div>
      <div class="card-body">
        <div class="card-dist">${news.district}</div>
        <div class="card-title">${isEnglish ? news.en_h : news.te_h}</div>
        <div class="card-telugu">${isEnglish ? '' : news.te_h}</div>
        <div class="card-footer">
          <span>By MaaOoru AI</span>
          <span>Today</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  generateFeed();
}

function applyFilters() {
  generateFeed();
}

function toggleLang() {
  isEnglish = !isEnglish;
  document.getElementById('langBtn').textContent = isEnglish ? 'Telugu' : 'English';
  generateFeed();
}

// Initial Load
generateFeed();
</script>
</body>
</html>
